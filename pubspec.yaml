name: graphite
publish_to: "none"
version: 1.0.0+1
description: A modern, local-first note-taking app inspired by Obsidian.

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.4
  path_provider: ^2.1.5
  go_router: ^15.0.0
  file_picker: ^8.0.0
  flutter_lints: ^5.0.0
  get_it: ^9.2.1
  flutter_markdown: ^0.7.7+1
  markdown: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  # Fix sqflite backend mismatch for desktop testing (CI/CD compatibility)
  sqflite_common_ffi: ^2.3.1
  sqlite3_flutter_libs: ^0.6.0+eol

flutter:
  uses-material-design: true
