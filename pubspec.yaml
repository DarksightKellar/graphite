name: graphite
publish_to: 'none'
version: 1.0.0+1
description: A modern, local-first note-taking app inspired by Obsidian.

environment:
  sdk: ^3.11.0

development_dependencies:
  flutter:
    sdk:
      path: ../../..
  cupertino_icons: ^1.0.8

# Local storage & database
sqflite: ^2.3.4
path: ^1.9.1
path_provider: ^2.1.5
rxdart: ^0.28.0

# Markdown & parsing
markdown: ^7.3.0
dart_markdown: ^1.0.2
highlighter: ^0.6.0

# File system abstraction (for cross-platform consistency)
file_system_router: ^0.4.0
fs_path: ^2.2.4

# Graph rendering
fl_chart: ^0.70.1
drawing: ^1.3.2+

# Navigation & state management
flutter_bloc: ^9.0.0
bloc: ^8.1.5
shared_preferences: ^2.3.3

# Utilities (for clean architecture)
foundation: ^0.0.2
